version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=mergemate_secret
      - DB_NAME=mergemate_db
    depends_on:
      - database

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  database:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mergemate_secret
      - POSTGRES_DB=mergemate_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
